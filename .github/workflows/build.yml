name: Build Signed Android APK

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: Checkout Code
  uses: actions/checkout@v3

- name: Setup Java JDK
  uses: actions/setup-java@v3
  with:
    java-version: '17'
    distribution: 'temurin'
    cache: gradle

- name: Grant execute permission for gradlew
  run: chmod +x gradlew

- name: Build Release APK
  run: ./gradlew assembleRelease

- name: Generate Free Certificate (Keystore)
  run: |
    keytool -genkey -v -keystore release.keystore -alias mykey -keyalg RSA -keysize 2048 -validity 10000 -storepass "password123" -keypass "password123" -dname "CN=MusicPulse, OU=MusicPulse, O=MusicPulse, L=City, S=State, C=US"

- name: Sign the APK
  run: |
    # Rename the file to something nice
    mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/MusicPulse-Signed.apk
    
    # Find the Android signing tool on the GitHub server
    export BUILD_TOOLS_VERSION=$(ls$ANDROID_HOME/build-tools | tail -1)
    export APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner
    
    # Sign the APK with the free certificate we just generated
    $APKSIGNER sign --ks release.keystore --ks-pass pass:password123 --ks-key-alias mykey --key-pass pass:password123 app/build/outputs/apk/release/MusicPulse-Signed.apk

- name: Upload Signed APK
  uses: actions/upload-artifact@v3
  with:
    name: MusicPulse-Signed-App
    path: app/build/outputs/apk/release/MusicPulse-Signed.apk
